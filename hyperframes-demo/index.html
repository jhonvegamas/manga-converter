<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>MangaConv — Product Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #0a1530; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; }
      .scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="20"
      data-width="1920"
      data-height="1080"
    >
      <!-- Scene 1: Logo Intro -->
      <div
        id="scene-1"
        class="scene"
        data-composition-id="scene1-logo-intro"
        data-composition-src="compositions/scene1-logo-intro.html"
        data-start="0"
        data-duration="1.5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 2-4: Continuous Canvas -->
      <div
        id="scene-2-4"
        class="scene"
        data-composition-id="scene2-4-canvas"
        data-composition-src="compositions/scene2-4-canvas.html"
        data-start="1.5"
        data-duration="12.5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 5: Logo Outro -->
      <div
        id="scene-5"
        class="scene"
        data-composition-id="scene5-logo-outro"
        data-composition-src="compositions/scene5-logo-outro.html"
        data-start="14"
        data-duration="6"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>


    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      mainTl.set("#scene-2-4", { scale: 1, filter: "blur(0px)" }, 1.5);
      mainTl.to(
        "#scene-2-4",
        { duration: 0.25, scale: 0.94, filter: "blur(6px)", opacity: 0, ease: "power2.in" },
        13.75,
      );

      window.__timelines["main"] = mainTl;
    </script>
  </body>
</html>
