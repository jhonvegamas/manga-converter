<template id="scene1-logo-intro-template">
  <div data-composition-id="scene1-logo-intro" data-width="1920" data-height="1080" data-duration="1.5">
    <div class="canvas">
      <div class="logo-container">
        <svg viewBox="0 0 256 256" width="200" height="200">
          <rect class="lp lp-bg" x="20" y="20" width="216" height="216" rx="40" fill="#5645d4"/>
          <rect class="lp lp-inner" x="56" y="56" width="144" height="144" rx="28" fill="#0a1530"/>
          <text class="lp lp-m" x="128" y="150" text-anchor="middle" fill="#ffffff" font-size="110" font-weight="700" font-family="Segoe UI, sans-serif">M</text>
          <text class="lp lp-c" x="128" y="200" text-anchor="middle" fill="#5645d4" font-size="28" font-weight="700" font-family="Segoe UI, sans-serif">CONV</text>
        </svg>
      </div>
      <div class="ring-container">
        <svg viewBox="0 0 400 400" width="400" height="400">
          <circle class="ring" cx="200" cy="200" r="90" fill="none" stroke="#6b4cf5" stroke-width="3"/>
        </svg>
      </div>
    </div>
    <style>
      [data-composition-id="scene1-logo-intro"] .canvas {
        width: 1920px; height: 1080px;
        background: linear-gradient(135deg, #0a1530 0%, #1a0a3e 50%, #0a1530 100%);
        position: relative; overflow: hidden;
      }
      [data-composition-id="scene1-logo-intro"] .logo-container {
        position: absolute; left: 860px; top: 420px;
        width: 200px; height: 200px; transform-origin: center center;
      }
      [data-composition-id="scene1-logo-intro"] .logo-container svg { transform-origin: center center; }
      [data-composition-id="scene1-logo-intro"] .ring-container {
        position: absolute; left: 760px; top: 340px;
        width: 400px; height: 400px; pointer-events: none;
      }
      [data-composition-id="scene1-logo-intro"] .ring {
        transform-origin: center center; opacity: 0;
      }
    </style>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const p = (s) => `[data-composition-id="scene1-logo-intro"] ${s}`;
        const logo = p(".logo-container svg");
        const ring = p(".ring");
        const container = p(".logo-container");

        gsap.set(logo, { scale: 0, opacity: 0 });
        gsap.set(ring, { scale: 0.5, opacity: 0 });

        tl.to(logo, { scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.4)" }, 0);
        tl.fromTo(ring, { scale: 0.2, opacity: 1 }, { scale: 2.5, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.3);
        tl.to(container, { scale: 1.1, duration: 0.12, ease: "power2.out" }, 0.3);
        tl.to(container, { scale: 1, duration: 0.12, ease: "power2.in" }, 0.42);
        tl.to(container, { scale: 0, duration: 0.3, ease: "expo.in", delay: 0.5 }, 0.7);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene1-logo-intro"] = tl;
      })();
    </script>
  </div>
</template>
